services:
  postgres:
    image: postgres:16-alpine
    container_name: latinfun-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: latinfun
      POSTGRES_USER: latinfun
      POSTGRES_PASSWORD: latinfun
    ports:
      - "5432:5432"
    volumes:
      - latinfun_postgres_data:/var/lib/postgresql/data

volumes:
  latinfun_postgres_data:
